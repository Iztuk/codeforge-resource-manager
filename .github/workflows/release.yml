name: Release

on:
  push:
    tags:
      - "v*"
permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
  
      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true
  
      - name: Run Tests
        run: go test -v ./...
  
      - name: Build release binaries
        env:
          CGO_ENABLED: 1
          GOOS: linux
          GOARCH: amd64
        run: |
          mkdir -p dist
          GOOS=linux GOARCH=amd64 go build -o dist/cfrm-linux-amd64 ./cmd
  
      - name: Create Github Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*
          generate_release_notes: true
