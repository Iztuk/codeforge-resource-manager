name: Release

on:
  push:
    tags:
      - "v*"
permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
  
      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true
  
      - name: Run Tests
        run: go test -v ./...
  
      - name: Build release binaries
        run: |
          mkdir -p dist
          GOOS=linux GOARCH=amd64 go build -o dist/cfrm-linux-amd64 ./cmd
          GOOS=linux GOARCH=arm64 go build -o dist/cfrm-linux-arm64 ./cmd
          GOOS=darwin GOARCH=amd64 go build -o dist/cfrm-darwin-amd64 ./cmd
          GOOS=darwin GOARCH=arm64 go build -o dist/cfrm-darwin-arm64 ./cmd
          GOOS=windows GOARCH=amd64 go build -o dist/cfrm-windows-amd64.exe ./cmd
  
      - name: Create Github Release
        uses: softprops/action-gh/release@v2
        with:
          files: dist/*
          generate_release_notes: true
